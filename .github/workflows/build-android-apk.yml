name: Build Android APK — CaptX Pro

on:
  push:
    branches: [main]
    paths:
      - "artifacts/captx-pro/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: artifacts/captx-pro
        run: eas build --platform android --profile preview --non-interactive --output ./captx-pro.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: captx-pro-apk
          path: artifacts/captx-pro/captx-pro.apk
          retention-days: 30

      - name: Comment APK download link
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            console.log('APK build complete! Download from Actions artifacts:', run.html_url);
